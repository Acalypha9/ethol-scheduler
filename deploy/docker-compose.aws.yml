services:
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:4000}
    image: ${FRONTEND_IMAGE:-ethol-scheduler-frontend:latest}
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ${BACKEND_IMAGE:-ethol-scheduler-backend:latest}
    restart: unless-stopped
    env_file:
      - ../backend/.env
    environment:
      HOST: 0.0.0.0
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      PUBLIC_BASE_URL: ${PUBLIC_BACKEND_URL:-http://localhost}
      PUBLIC_WS_BASE_URL: ${PUBLIC_WS_BASE_URL:-ws://localhost}
      WHATSAPP_WEBHOOK_URL: ${WHATSAPP_WEBHOOK_URL:-http://wa-bot:3005/webhook}

  wa-bot:
    build:
      context: ../wa-bot
      dockerfile: Dockerfile
    image: ${WA_BOT_IMAGE:-ethol-scheduler-wa-bot:latest}
    restart: unless-stopped
    shm_size: "1gb"
    env_file:
      - ../wa-bot/.env
    environment:
      BOT_PORT: 3005
      API_BASE_URL: ${BOT_API_BASE_URL:-http://backend:4000}
      NOTIFICATION_WS_URL: ${BOT_NOTIFICATION_WS_URL:-ws://backend:4000/ws/notifications}
      BOT_PUBLIC_BASE_URL: ${BOT_PUBLIC_BASE_URL:-http://localhost:3005}
    volumes:
      - wa_auth:/app/.wwebjs_auth
      - wa_cache:/app/.wwebjs_cache
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - wa-bot
    ports:
      - "80:80"
      - "443:443"
    command: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./nginx/default.conf:/etc/nginx/templates/default-http.conf:ro
      - ./nginx/default.ssl.conf:/etc/nginx/templates/default-ssl.conf:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ./letsencrypt/www:/var/www/certbot:ro
      - ./letsencrypt/live:/etc/nginx/certs:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ["tls"]
    volumes:
      - ./letsencrypt/www:/var/www/certbot
      - ./letsencrypt/conf:/etc/letsencrypt
      - ./letsencrypt/live:/etc/nginx/certs

volumes:
  wa_auth:
  wa_cache:
