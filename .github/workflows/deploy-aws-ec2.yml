name: Deploy AWS EC2

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy repository to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          source: "."
          target: "/opt/ethol-scheduler"
          overwrite: true
          strip_components: 0

      - name: Run deployment script on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          script: |
            export APP_DIR=/opt/ethol-scheduler
            export GIT_REF=${{ github.ref_name }}
            bash /opt/ethol-scheduler/scripts/aws/deploy-ec2.sh
